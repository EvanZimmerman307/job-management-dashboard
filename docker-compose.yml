services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobsdb
      POSTGRES_USER: jobs
      POSTGRES_PASSWORD: jobs
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobs -d jobsdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app_net

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgres://jobs:jobs@postgres:5432/jobsdb
      DJANGO_SETTINGS_MODULE: app.settings
      DEBUG: "0"
      ALLOWED_HOSTS: "backend,frontend,localhost,127.0.0.1"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/jobs/')\""]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 20s
    networks:
      - app_net

  frontend-test:
    build:
      context: ./frontend
      target: tester

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app_net

  e2e:
    build: ./e2e
    environment:
      BASE_URL: http://frontend:80
      API_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  postgres_data:
